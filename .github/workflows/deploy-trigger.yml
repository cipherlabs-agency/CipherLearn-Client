name: Trigger CipherLearn Redeploy

on:
  push:
    branches: [main]

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify admin portal to redeploy all classes
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST "${{ vars.CIPHERLEARN_PORTAL_URL }}/api/portal/hosting/webhooks/github-push" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.CIPHERLEARN_DEPLOY_SECRET }}" \
            -d "{\"sha\":\"${{ github.sha }}\",\"message\":$(echo '${{ github.event.head_commit.message }}' | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read().strip()))')}")
          echo "HTTP status: $HTTP_CODE"
          echo "$HTTP_CODE" | grep -q "^2" || (echo "Webhook failed with HTTP $HTTP_CODE" && exit 1)
